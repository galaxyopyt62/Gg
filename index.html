<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Stream</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.13/hls.min.js"></script>
<style>
  :root{
    --void: #0A0B14;
    --void-2: #11132280;
    --panel: #151729;
    --panel-2: #1C1F3A;
    --line: #2A2E52;
    --text: #E8EAF6;
    --muted: #7378A0;
    --blue: #4D7FFF;
    --violet: #8B5FFF;
    --live: #FF4760;
    --live-glow: #FF476033;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--void);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    overflow-x:hidden;
  }
  ::selection{background:var(--blue); color:#fff;}

  /* ambient starfield */
  #stars{position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.6;}

  a{color:inherit; text-decoration:none;}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}

  .wrap{position:relative; z-index:1;}

  /* ---------- HEADER ---------- */
  header{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px clamp(20px,5vw,56px);
    background:linear-gradient(180deg, rgba(10,11,20,.95), rgba(10,11,20,.75));
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);
  }
  .logo{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700; font-size:20px; letter-spacing:.02em;
    display:flex; align-items:center; gap:10px;
  }
  .logo .mark{
    width:30px; height:30px; border-radius:9px;
    background:conic-gradient(from 220deg, var(--blue), var(--violet), var(--blue));
    box-shadow:0 0 22px var(--live-glow), 0 0 18px #4D7FFF55;
  }
  .logo .mark{box-shadow:0 0 18px #4D7FFF66;}
  nav{display:flex; gap:28px; font-size:14px; color:var(--muted);}
  nav a{transition:color .2s;}
  nav a:hover, nav a.active{color:var(--text);}
  .search-box{
    display:flex; align-items:center; gap:8px;
    background:var(--panel); border:1px solid var(--line); border-radius:999px;
    padding:9px 16px; min-width:220px;
  }
  .search-box input{
    background:none; border:none; outline:none; color:var(--text); font-size:13px; width:100%;
  }
  .search-box input::placeholder{color:var(--muted);}
  .search-box svg{flex-shrink:0; opacity:.6;}

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    margin:28px clamp(20px,5vw,56px) 8px;
    border-radius:20px;
    overflow:hidden;
    border:1px solid var(--line);
    background:
      radial-gradient(120% 140% at 85% -10%, #2A2F6A60 0%, transparent 55%),
      linear-gradient(160deg, var(--panel), var(--void) 75%);
    padding:clamp(28px,5vw,56px);
    display:grid;
    grid-template-columns:1.1fr .9fr;
    gap:40px;
    align-items:center;
  }
  @media(max-width:860px){ .hero{grid-template-columns:1fr;} }

  .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.08em;
    color:var(--blue); text-transform:uppercase; margin-bottom:18px;
  }
  .eyebrow .dot{width:6px; height:6px; border-radius:50%; background:var(--blue); box-shadow:0 0 8px var(--blue);}
  .hero h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:clamp(32px,4.4vw,52px);
    line-height:1.05;
    letter-spacing:-.01em;
    margin-bottom:18px;
  }
  .hero h1 span{
    background:linear-gradient(90deg, var(--blue), var(--violet));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .hero p{color:var(--muted); font-size:16px; line-height:1.6; max-width:46ch; margin-bottom:28px;}
  .hero-actions{display:flex; gap:14px; flex-wrap:wrap;}
  .btn-primary{
    background:linear-gradient(90deg, var(--blue), var(--violet));
    color:#fff; padding:13px 26px; border-radius:11px; font-weight:600; font-size:14px;
    display:inline-flex; align-items:center; gap:8px;
    box-shadow:0 8px 24px -8px #4D7FFF88;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn-primary:hover{transform:translateY(-2px); box-shadow:0 12px 28px -8px #4D7FFFaa;}
  .btn-ghost{
    border:1px solid var(--line); padding:13px 26px; border-radius:11px; font-weight:600; font-size:14px; color:var(--text);
    transition:border-color .15s, background .15s;
  }
  .btn-ghost:hover{border-color:var(--blue); background:#4D7FFF14;}

  .hero-preview{
    position:relative; border-radius:16px; overflow:hidden; aspect-ratio:16/10;
    border:1px solid var(--line); background:#000;
    display:flex; align-items:center; justify-content:center;
  }
  .hero-preview video{width:100%; height:100%; object-fit:cover; display:block;}
  .hero-preview .live-tag{
    position:absolute; top:14px; left:14px;
    background:var(--live); font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600;
    padding:5px 10px; border-radius:999px; display:flex; align-items:center; gap:6px;
    box-shadow:0 0 16px var(--live-glow);
  }
  .live-tag .pulse{width:6px; height:6px; border-radius:50%; background:#fff; animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1; transform:scale(1);} 50%{opacity:.4; transform:scale(.7);}}
  .hero-preview .play-overlay{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(180deg, transparent 40%, #000a 100%);
    opacity:0; transition:opacity .2s; cursor:pointer;
  }
  .hero-preview:hover .play-overlay{opacity:1;}
  .play-circle{
    width:58px; height:58px; border-radius:50%;
    background:#fff; display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 30px #fff8;
  }

  /* ---------- CATEGORIES ---------- */
  .categories{
    display:flex; gap:10px; overflow-x:auto; padding:28px clamp(20px,5vw,56px) 4px;
    scrollbar-width:none;
  }
  .categories::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0; padding:9px 18px; border-radius:999px; font-size:13px; font-weight:500;
    border:1px solid var(--line); color:var(--muted); transition:all .15s;
    white-space:nowrap;
  }
  .chip.active, .chip:hover{
    border-color:var(--blue); color:var(--text); background:#4D7FFF1a;
  }

  /* ---------- SECTION ---------- */
  section.row{padding:24px clamp(20px,5vw,56px);}
  .row-head{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:18px;}
  .row-head h2{
    font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:600;
    display:flex; align-items:center; gap:10px;
  }
  .row-head .count{
    font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); font-weight:400;
  }

  .grid{
    display:grid; gap:18px;
    grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
  }

  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:14px; overflow:hidden;
    cursor:pointer; transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
  }
  .card:hover{transform:translateY(-4px); border-color:#3a3f72; box-shadow:0 14px 30px -16px #000c;}
  .thumb{
    position:relative; aspect-ratio:16/9; background:linear-gradient(160deg,#1c1f3a,#0e0f1e);
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .thumb .badge-live{
    position:absolute; top:10px; left:10px;
    background:var(--live); font-size:10px; font-weight:700; letter-spacing:.04em;
    padding:4px 8px; border-radius:6px; display:flex; align-items:center; gap:5px;
    font-family:'JetBrains Mono',monospace;
  }
  .thumb .badge-live .pulse{width:5px; height:5px; border-radius:50%; background:#fff; animation:pulse 1.4s infinite;}
  .thumb .badge-src{
    position:absolute; bottom:10px; right:10px;
    background:#000a; backdrop-filter:blur(4px);
    font-size:10px; padding:4px 8px; border-radius:6px; color:var(--muted);
    font-family:'JetBrains Mono',monospace; text-transform:uppercase;
  }
  .card-body{padding:14px 16px;}
  .card-body h3{font-size:15px; font-weight:600; margin-bottom:4px; line-height:1.3;}
  .card-body p{font-size:12.5px; color:var(--muted);}

  .empty{
    text-align:center; padding:60px 20px; color:var(--muted);
    font-family:'JetBrains Mono',monospace; font-size:13px;
  }

  /* ---------- PLAYER MODAL ---------- */
  .player-overlay{
    position:fixed; inset:0; background:#000d; backdrop-filter:blur(6px);
    z-index:100; display:none; align-items:center; justify-content:center; padding:24px;
  }
  .player-overlay.open{display:flex;}
  .player-box{
    width:100%; max-width:1100px; background:var(--panel); border:1px solid var(--line);
    border-radius:16px; overflow:hidden;
  }
  .player-stage{position:relative; aspect-ratio:16/9; background:#000;}
  .player-stage video, .player-stage iframe{
    width:100%; height:100%; border:none; display:block;
  }
  .player-meta{padding:18px 22px; display:flex; align-items:center; justify-content:space-between; gap:16px;}
  .player-meta h3{font-family:'Space Grotesk',sans-serif; font-size:17px; margin-bottom:4px;}
  .player-meta p{font-size:13px; color:var(--muted);}
  .player-actions{display:flex; gap:10px; flex-shrink:0;}
  .icon-btn{
    width:38px; height:38px; border-radius:10px; border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; transition:border-color .15s, background .15s;
  }
  .icon-btn:hover{border-color:var(--blue); background:#4D7FFF14;}

  /* ---------- FLOATING MINI PLAYER ---------- */
  .mini-player{
    position:fixed; bottom:20px; right:20px; width:300px;
    background:var(--panel); border:1px solid var(--line); border-radius:14px; overflow:hidden;
    box-shadow:0 18px 40px -12px #000c; z-index:90; display:none;
  }
  .mini-player.open{display:block;}
  .mini-stage{aspect-ratio:16/9; background:#000; position:relative;}
  .mini-stage video, .mini-stage iframe{width:100%; height:100%; border:none; display:block;}
  .mini-head{
    display:flex; align-items:center; justify-content:space-between; padding:8px 12px;
    font-size:12px; color:var(--muted);
  }
  .mini-head button{color:var(--muted); font-size:16px; line-height:1;}
  .mini-head button:hover{color:var(--text);}

  footer{
    padding:40px clamp(20px,5vw,56px) 60px; color:var(--muted); font-size:12.5px;
    border-top:1px solid var(--line); margin-top:40px;
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px;
  }

  @media(max-width:640px){
    nav{display:none;}
    .search-box{min-width:0; flex:1; margin-left:12px;}
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="wrap">

  <header>
    <div class="logo"><div class="mark"></div>Galaxy Stream</div>
    <nav>
      <a href="#" class="active" data-cat="all">Home</a>
      <a href="#" data-cat="live">Live now</a>
      <a href="#" data-cat="">Categories</a>
    </nav>
    <div class="search-box">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="searchInput" type="text" placeholder="Search channels…">
    </div>
  </header>

  <section class="hero" id="heroSection"></section>

  <div class="categories" id="categoryBar"></div>

  <section class="row">
    <div class="row-head">
      <h2 id="resultsTitle">All channels</h2>
      <span class="count" id="resultsCount"></span>
    </div>
    <div class="grid" id="channelGrid"></div>
  </section>

  <footer>
    <span>Galaxy Stream — channel data loaded from <code>channels.json</code></span>
    <span>Supports HLS (.m3u8), DASH (.mpd), YouTube &amp; Twitch embeds</span>
  </footer>

</div>

<!-- Full player -->
<div class="player-overlay" id="playerOverlay">
  <div class="player-box">
    <div class="player-stage" id="playerStage"></div>
    <div class="player-meta">
      <div>
        <h3 id="playerTitle">—</h3>
        <p id="playerSubtitle">—</p>
      </div>
      <div class="player-actions">
        <button class="icon-btn" id="floatBtn" title="Float / Mini player">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="14" rx="2"/><rect x="11" y="9" width="8" height="6" rx="1" fill="currentColor"/></svg>
        </button>
        <button class="icon-btn" id="closeBtn" title="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Floating mini player -->
<div class="mini-player" id="miniPlayer">
  <div class="mini-head">
    <span id="miniTitle">—</span>
    <button id="miniClose">✕</button>
  </div>
  <div class="mini-stage" id="miniStage"></div>
</div>

<script>
/* ---------------- starfield ambiance ---------------- */
(function(){
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize(){
    c.width = innerWidth; c.height = innerHeight;
    stars = Array.from({length: Math.floor((innerWidth*innerHeight)/9000)}, () => ({
      x: Math.random()*innerWidth, y: Math.random()*innerHeight,
      r: Math.random()*1.3+.2, s: Math.random()*.4+.1, o: Math.random()*.6+.2
    }));
  }
  function tick(){
    ctx.clearRect(0,0,c.width,c.height);
    ctx.fillStyle = '#ffffff';
    for(const st of stars){
      st.y += st.s;
      if(st.y > c.height) st.y = 0;
      ctx.globalAlpha = st.o;
      ctx.beginPath();
      ctx.arc(st.x, st.y, st.r, 0, 7);
      ctx.fill();
    }
    requestAnimationFrame(tick);
  }
  addEventListener('resize', resize);
  resize(); tick();
})();

/* ---------------- data ---------------- */
let CHANNELS = [];
let currentCategory = 'all';
let currentQuery = '';
let activeHls = null;
let miniHls = null;

const grid = document.getElementById('channelGrid');
const resultsTitle = document.getElementById('resultsTitle');
const resultsCount = document.getElementById('resultsCount');
const categoryBar = document.getElementById('categoryBar');

async function loadChannels(){
  try{
    const res = await fetch('channels.json', {cache:'no-store'});
    CHANNELS = await res.json();
  }catch(e){
    // Fallback inline sample data if channels.json can't be fetched
    // (e.g. opened as a local file:// instead of being served).
    CHANNELS = FALLBACK_CHANNELS;
  }
  buildCategories();
  renderHero();
  render();
}

function buildCategories(){
  const cats = ['all', ...new Set(CHANNELS.map(c => c.category))];
  categoryBar.innerHTML = cats.map(cat => `
    <button class="chip ${cat==='all'?'active':''}" data-cat="${cat}">
      ${cat === 'all' ? 'All' : cat}
    </button>
  `).join('');
  categoryBar.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      currentCategory = btn.dataset.cat;
      categoryBar.querySelectorAll('.chip').forEach(b => b.classList.toggle('active', b===btn));
      render();
    });
  });
}

function renderHero(){
  const hero = document.getElementById('heroSection');
  const featured = CHANNELS.find(c => c.isLive) || CHANNELS[0];
  if(!featured){ hero.innerHTML = ''; return; }
  hero.innerHTML = `
    <div>
      <div class="eyebrow"><span class="dot"></span> ${featured.isLive ? 'Live now' : 'Featured'}</div>
      <h1>Watch the moment<br><span>as it happens.</span></h1>
      <p>Galaxy Stream brings together your channels in one clean player — HLS, DASH, YouTube and Twitch, all in one place.</p>
      <div class="hero-actions">
        <a class="btn-primary" id="heroWatch" href="#">▶ Watch ${escapeHtml(featured.title)}</a>
        <a class="btn-ghost" href="#channelGrid">Browse all</a>
      </div>
    </div>
    <div class="hero-preview" id="heroPreview">
      ${featured.isLive ? `<div class="live-tag"><span class="pulse"></span>LIVE</div>` : ''}
      <div class="play-overlay"><div class="play-circle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#0A0B14"><path d="M8 5v14l11-7z"/></svg>
      </div></div>
      ${featured.thumbnail ? `<img src="${featured.thumbnail}" alt="">` : ''}
    </div>
  `;
  const open = () => openPlayer(featured);
  document.getElementById('heroWatch').addEventListener('click', e => { e.preventDefault(); open(); });
  document.getElementById('heroPreview').addEventListener('click', open);
}

function render(){
  let list = CHANNELS.filter(c => {
    const matchCat = currentCategory === 'all' || c.category === currentCategory ||
                      (currentCategory === 'live' && c.isLive);
    const matchQuery = !currentQuery || (c.title+c.subtitle).toLowerCase().includes(currentQuery);
    return matchCat && matchQuery;
  });

  resultsTitle.textContent = currentCategory === 'all' ? 'All channels' :
                              currentCategory === 'live' ? 'Live now' : currentCategory;
  resultsCount.textContent = `${list.length} channel${list.length!==1?'s':''}`;

  if(list.length === 0){
    grid.innerHTML = `<div class="empty">No channels match — try a different search or category.</div>`;
    return;
  }

  grid.innerHTML = list.map((c, i) => `
    <div class="card" data-idx="${CHANNELS.indexOf(c)}">
      <div class="thumb">
        ${c.isLive ? `<div class="badge-live"><span class="pulse"></span>LIVE</div>` : ''}
        <div class="badge-src">${c.sourceType}</div>
        ${c.thumbnail ? `<img src="${c.thumbnail}" alt="">` : ''}
      </div>
      <div class="card-body">
        <h3>${escapeHtml(c.title)}</h3>
        <p>${escapeHtml(c.subtitle || '')}</p>
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => openPlayer(CHANNELS[+card.dataset.idx]));
  });
}

document.getElementById('searchInput').addEventListener('input', e => {
  currentQuery = e.target.value.trim().toLowerCase();
  render();
});

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* ---------------- player engine ---------------- */
// sourceType: "hls" | "dash" | "youtube" | "twitch" | "mp4"

function buildStageHtml(channel, idAttr){
  if(channel.sourceType === 'youtube'){
    return `<iframe id="${idAttr}" src="https://www.youtube.com/embed/${channel.embedId}?autoplay=1" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
  }
  if(channel.sourceType === 'twitch'){
    const parent = location.hostname || 'localhost';
    return `<iframe id="${idAttr}" src="https://player.twitch.tv/?channel=${channel.embedId}&parent=${parent}&autoplay=true" allowfullscreen></iframe>`;
  }
  return `<video id="${idAttr}" controls autoplay playsinline></video>`;
}

function attachStreamSource(channel, videoEl, hlsRefSetter){
  if(channel.sourceType === 'youtube' || channel.sourceType === 'twitch') return;
  if(channel.sourceType === 'hls' || channel.sourceType === 'dash'){
    if(window.Hls && Hls.isSupported()){
      const hls = new Hls();
      hls.loadSource(channel.streamUrl);
      hls.attachMedia(videoEl);
      hlsRefSetter(hls);
    } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
      videoEl.src = channel.streamUrl; // native HLS (Safari)
    }
  } else {
    videoEl.src = channel.streamUrl; // plain mp4 etc
  }
}

const playerOverlay = document.getElementById('playerOverlay');
const playerStage = document.getElementById('playerStage');
const playerTitle = document.getElementById('playerTitle');
const playerSubtitle = document.getElementById('playerSubtitle');

function openPlayer(channel){
  closeMini();
  if(activeHls){ activeHls.destroy(); activeHls = null; }
  playerStage.innerHTML = buildStageHtml(channel, 'mainStageEl');
  playerTitle.textContent = channel.title;
  playerSubtitle.textContent = channel.subtitle || '';
  playerOverlay.classList.add('open');
  playerOverlay.dataset.channelIdx = CHANNELS.indexOf(channel);

  const el = document.getElementById('mainStageEl');
  if(el && el.tagName === 'VIDEO'){
    attachStreamSource(channel, el, h => activeHls = h);
  }
}

document.getElementById('closeBtn').addEventListener('click', () => {
  playerOverlay.classList.remove('open');
  if(activeHls){ activeHls.destroy(); activeHls = null; }
  playerStage.innerHTML = '';
});

playerOverlay.addEventListener('click', e => {
  if(e.target === playerOverlay){ document.getElementById('closeBtn').click(); }
});

/* float into mini player */
const miniPlayer = document.getElementById('miniPlayer');
const miniStage = document.getElementById('miniStage');
const miniTitle = document.getElementById('miniTitle');

document.getElementById('floatBtn').addEventListener('click', () => {
  const idx = +playerOverlay.dataset.channelIdx;
  const channel = CHANNELS[idx];
  if(!channel) return;
  if(activeHls){ activeHls.destroy(); activeHls = null; }
  playerOverlay.classList.remove('open');
  playerStage.innerHTML = '';

  miniStage.innerHTML = buildStageHtml(channel, 'miniStageEl');
  miniTitle.textContent = channel.title;
  miniPlayer.classList.add('open');

  const el = document.getElementById('miniStageEl');
  if(el && el.tagName === 'VIDEO'){
    attachStreamSource(channel, el, h => miniHls = h);
  }
});

function closeMini(){
  miniPlayer.classList.remove('open');
  if(miniHls){ miniHls.destroy(); miniHls = null; }
  miniStage.innerHTML = '';
}
document.getElementById('miniClose').addEventListener('click', closeMini);

/* ---------------- fallback sample data ---------------- */
// Used only if channels.json fails to load (e.g. opened via file://).
// Replace / extend channels.json with your own licensed or embeddable sources.
const FALLBACK_CHANNELS = [
  {
    title: "Sample HLS Test Stream",
